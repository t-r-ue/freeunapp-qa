<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mock FreeUnApp Target Page</title>
  <style>
    body { font-family: sans-serif; padding: 40px; background: #fafafa; color: #18181b; }
    .card { background: white; border: 1px solid #e4e4e7; border-radius: 4px; padding: 20px; max-width: 600px; margin: 40px auto; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
    h1 { font-size: 1.5rem; margin-bottom: 12px; }
    button { padding: 8px 16px; background: #6366F1; color: white; border: none; border-radius: 3px; cursor: pointer; font-weight: 600; }
    button:hover { background: #4338CA; }
  </style>
</head>
<body>

<div class="card">
  <h1>Mock FreeUnApp Target Page</h1>
  <p>This is a simulated page representing the production codebase of FreeUnApp. The feedback widget is embedded below using a script tag.</p>
  <p>Click the vertical tab on the right to open the drawer, enter some feedback, and submit it.</p>
  
  <div style="margin-top:20px; display:flex; gap:10px;">
    <button onclick="triggerSimulatedError()">Simulate Console Error</button>
  </div>
</div>

<script>
  function triggerSimulatedError() {
    console.error("Test Error: Failed to fetch user scholarship documentation (simulated).");
    alert("Simulated console error logged. Try submitting feedback to verify console interception.");
  }
</script>

<!-- Embedded Feedback Widget -->
<script src="/feedback.js"></script>

</body>
</html>
